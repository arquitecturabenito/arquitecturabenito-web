    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cormorant Garamond', serif;
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-in-out;
      }
    </style>
</head>
<body class="bg-black text-gray-300">

            </div>
            
            <!-- COMIENZA A AÑADIR TUS PROYECTOS AQUÍ -->

                    <div class="flex justify-between items-baseline">
                        <h3 class="text-xl text-zinc-200 tracking-wider">Nombre del Proyecto</h3>
                        <span class="text-xs text-zinc-500 font-mono">2024</span>
                    </div>
                    <p class="text-sm text-zinc-400 mt-2">Categoría (Ej. Residencial, Comercial)</p>

                <!-- Fin del ejemplo -->

                <!-- Añade más proyectos como el de arriba -->
