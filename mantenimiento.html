<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantenimiento - Arquitectura Benito</title>
  <link rel="icon" href="imagenes/favicon.ico" type="image/x-icon">
  <style>
   body {
      margin: 0;
      background-color: #efeeec; /* Color similar al fondo de Ryan Hentzen */
      font-family: Arial, sans-serif;
      color: #1e1e1e;
      text-align: center;
    }

    header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  font-weight: bold;
  font-size: 1.2rem;
  box-sizing: border-box;
}

.logo-container {
  display: flex;
  align-items: center;
  flex: 1;
}

.logo {
  width: 40px; /* Ajusta el tamaño del logo */
  height: auto; /* Mantiene la proporción */
  margin-right: 10px; /* Espacio entre el logo y el texto */
}

.header-link {
  text-decoration: none;
  color: inherit;
  display: flex;
 
 
}

#clock {
  flex: 1;
  text-align: center;
  font-size: 1.5rem;
  font-family: 'Courier New', monospace;
}


header a:last-child {
  flex: 1;
  text-align: right;
  text-decoration: none;
  color: inherit;
}
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex: 1; /* Ocupa el espacio restante entre el header y el footer */
    }

    h1 {
      font-size: 2.5rem; /* Título principal */
      margin: 20px 0;
      font-weight: bold;
    }

    p {
      font-size: 1.2rem; /* Subtítulos */
      margin: 10px 0 20px 0;
      color: inherit; /* Color uniforme */
    }

    .button {
      display: inline-block;
      background-color: #1e1e1e; /* Fondo oscuro para contraste */
      color: #efeeec; /* Texto claro */
      font-size: 1rem;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .button:hover {
      background-color: #333; /* Fondo más oscuro al pasar el cursor */
    }

    footer {
      font-size: 0.9rem;
      color: #777;
      padding: 20px 0;
    }
    
    @media (max-width: 768px) {
        header {
        flex-direction: column;
        align-items: center;
    .grid {
      gap: 40px; /* Reduce el espacio entre elementos en pantallas pequeñas */
    }

    .project {
      max-width: 300px; /* Reduce el tamaño máximo de las cajas */
    }  }  } 
    
  </style>
</head>
<body>
    <header>
        <div class="logo-container">
          <img src="imagenes/logo.png" alt="Logo" class="logo">
           <a href="index.html" class="header-link">ARQUITECTURA BENITO</a> 
      </div>
        </div>
        <div id="clock">00:00:00</div>
        <a href="contacto.html" class="header">CONTACTO</a>
      </header>
  <main>
    <h1>PÁGINA EN MANTENIMIENTO</h1>
    <p>Page Under Maintenance</p>
    <p>Seite in Wartung</p>
    <a href="index.html" class="button">Volver al Inicio</a>
  </main>

  <footer>© Arquitectura Benito, 2025</footer>

  <script>
    // Reloj en tiempo real
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
