<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto - Benito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cormorant Garamond', serif;
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-in-out;
      }
    </style>
</head>
<body class="bg-black text-gray-300">
    <div class="w-full min-h-screen overflow-auto p-8 relative animate-fade-in">
        <div class="absolute top-8 left-8 z-20">
            <a href="/" class="text-zinc-400 hover:text-white transition-colors duration-300 font-mono tracking-widest text-sm uppercase flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                <span>Volver</span>
            </a>
        </div>
        <div class="max-w-5xl mx-auto relative z-10">
            <div class="text-center mb-12 mt-24">
                <h2 class="text-4xl font-light tracking-[0.3em] text-zinc-200 uppercase">Contacto</h2>
                <div class="w-48 h-[1px] bg-zinc-800 mx-auto mt-4 mb-6"></div>
                <p class="text-zinc-400 mt-2 max-w-2xl mx-auto tracking-wider">Para colaboraciones, consultas o para iniciar una conversación sobre un nuevo proyecto.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-12 items-start">
                <div class="space-y-8 pt-2 md:col-span-2">
                    <h3 class="text-lg font-semibold tracking-widest text-white uppercase">Información de Contacto</h3>
                    <ul class="space-y-5">
                        <li>
                            <div class="flex items-start gap-4 text-zinc-300 font-mono text-sm">
                                <span class="text-zinc-500 w-24 flex-shrink-0">Ubicación</span>
                                <span>Madrid, Madrid<br/>San Pedro del Pinatar, Murcia</span>
                            </div>
                        </li>
                        <li>
                            <a href="tel:+34618958842" class="hover:text-white transition-colors duration-300 block">
                                <div class="flex items-start gap-4 text-zinc-300 font-mono text-sm">
                                    <span class="text-zinc-500 w-24 flex-shrink-0">Teléfono</span>
                                    <span>+34 618 958 842</span>
                                </div>
                            </a>
                        </li>
                        <li>
                            <a href="mailto:arquitecturabenito@gmail.com" class="hover:text-white transition-colors duration-300 block">
                                <div class="flex items-start gap-4 text-zinc-300 font-mono text-sm">
                                    <span class="text-zinc-500 w-24 flex-shrink-0">Email</span>
                                    <span>arquitecturabenito@gmail.com</span>
                                </div>
                            </a>
                        </li>
                        <li>
                            <a href="#" class="hover:text-white transition-colors duration-300 block">
                                <div class="flex items-start gap-4 text-zinc-300 font-mono text-sm">
                                    <span class="text-zinc-500 w-24 flex-shrink-0">Social</span>
                                    <span>@arquitecturabenito</span>
                                </div>
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="bg-black border border-zinc-800 p-8 md:p-10 md:col-span-3">
                    <form class="space-y-8">
                        <div>
                            <label for="name" class="block text-xs font-mono tracking-widest uppercase text-zinc-400 mb-2">Nombre</label>
                            <input type="text" name="name" id="name" required class="w-full bg-transparent border-b border-zinc-700 text-white py-2 focus:outline-none focus:border-white transition" />
                        </div>
                        <div>
                            <label for="email" class="block text-xs font-mono tracking-widest uppercase text-zinc-400 mb-2">Email</label>
                            <input type="email" name="email" id="email" required class="w-full bg-transparent border-b border-zinc-700 text-white py-2 focus:outline-none focus:border-white transition" />
                        </div>
                        <div>
                            <label for="message" class="block text-xs font-mono tracking-widest uppercase text-zinc-400 mb-2">Mensaje</label>
                            <textarea name="message" id="message" rows="4" required class="w-full bg-transparent border-b border-zinc-700 text-white py-2 focus:outline-none focus:border-white transition resize-none"></textarea>
                        </div>
                        <div>
                            <button type="submit" class="w-full border border-zinc-500 text-zinc-300 font-mono text-sm mt-4 px-8 py-3 tracking-widest uppercase hover:bg-white hover:text-black transition-colors duration-300">
                                Enviar Mensaje
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
