    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
      }
      body {
        font-family: 'Cormorant Garamond', serif;

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-in-out;
      }
      
      @keyframes dash-flow {
        to {
          stroke-dashoffset: -16;
        }
      }

      .animated-link {
        stroke-dasharray: 4 4;
        animation: dash-flow 1.5s linear infinite;
      }
      
      @keyframes sun-pulse {
        0%, 100% {
          transform: scale(1);
          filter: drop-shadow(0 0 4px #00ffff);
        }
        50% {
          transform: scale(1.1);
          filter: drop-shadow(0 0 8px #00ffff);
        }
      }

      .sun-node {
        animation: sun-pulse 4s ease-in-out infinite;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",

</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
      // DATA STORE
      const allProjectsData = [
        // ARCHITECTURE
        { id: 'paseo-dehesa', category: 'architecture', title: 'PASEO DEHESA', normalImage: 'imagenes/paseodehesa-main.png', rolloverImage: 'imagenes/paseodehesa-main-rollover.png', description: 'Este es un ejemplo de descripción para el proyecto Paseo Dehesa. Aquí puedes detallar los objetivos, el proceso de diseño, los materiales utilizados y cualquier otra información relevante sobre la obra. El objetivo es dar contexto y profundidad a las imágenes que se muestran a continuación.', images: ['imagenes/paseodehesa-1.png', 'imagenes/paseodehesa-2.png', 'imagenes/paseodehesa-3.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        { id: 'el-escorial', category: 'architecture', title: 'COCINA MONACAL DE EL ESCORIAL', normalImage: 'imagenes/elescorial-main.png', rolloverImage: 'imagenes/elescorial-main-rollover.png', description: 'El objetivo del estudio se resume en formular una hipótesis objetiva de cómo era la cocina del monasterio de El Escorial en su construcción, así como la formulación de hipótesis sobre su evolución a lo largo del tiempo. Para ello, la primera fase de la investigación se trató de un análisis de documentación centrada en casos similares. Se ha tratado recrear mediante un dibujo en perspectiva del espacio (similar a los grabados de Scappi) el ambiente en la cocina. Para ello se han tenido en cuenta los estudios sobre los objetos presentes en la cocina de la época así como los métodos de cocina más empleados, que se han deducido a partir de los escritos de Banchetti. Se trata de representar el espacio como lo que fue, un lugar ajetreado con un gran flujo constante de gente y alimentos, ya que conllevaba muchos recursos abastecer al monasterio de comida suficiente para la cantidad estimada de monjes que requerían esta cocina.', images: ['imagenes/elescorial-1.png', 'imagenes/elescorial-2.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        { id: 'ia-render', category: 'architecture', title: 'RENDERIZADO IA', normalImage: 'imagenes/iarender-main.png', rolloverImage: 'imagenes/iarender-main-rollover.png', description: 'Una exploración conceptual sobre cómo las herramientas de inteligencia artificial pueden expandir los horizontes del diseño arquitectónico. Este proyecto no representa una construcción física, sino un manifiesto visual de las posibilidades estéticas y formales que emergen al colaborar con algoritmos generativos.', images: ['imagenes/iarender-1.png', 'imagenes/iarender-2.png', 'imagenes/iarender-3.png', 'imagenes/iarender-4.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        { id: 'coleccion-de-curvas', category: 'architecture', title: 'COLECCIÓN DE CURVAS', normalImage: 'imagenes/colecciondecurvas-main.png', rolloverImage: 'imagenes/colecciondecurvas-main-rollover.png', description: 'El proyecto “Colección de curvas” busca dibujar un paisaje de usos, unas oficinas que sean paisaje y una experiencia para el día a día. Crear una vorágine de estancias delimitadas entre sí mediante espacios verdes, terrazas y callejones. El objetivo es proyectar unas oficinas que mejoren la calidad del trabajo o hagan de este una parte cómoda de la rutina. Para lograr todo esto, buscamos combinar una serie de espacios, con formas de habitarlos flexibles a la par que específicas. Este proyecto comienza siendo una geometría desordenada de planos trazados a mano alzada. Posteriormente, se le impone una geometría basada en circunferencias de cinco radios distintos y tangencias entre ellas. Para ordenar las geometrías, se disponen de forma ordenada y atendiendo a los usos que estas albergarán. Una vez distribuidas en la parcela, se le superpone una retícula de pilares.', images: ['imagenes/colecciondecurvas-1.png', 'imagenes/colecciondecurvas-2.png', 'imagenes/colecciondecurvas-3.png', 'imagenes/colecciondecurvas-4.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        { id: 'arboles-y-telas', category: 'architecture', title: 'ÁRBOLES Y TELAS', normalImage: 'imagenes/arbolesytelas-main.png', rolloverImage: 'imagenes/arbolesytelas-main-rollover.png', description: 'Pabellón efímero diseñado para un festival de arte. La estructura, ligera y permeable, se integra con el paisaje natural circundante. El juego de sombras proyectado por las telas tensadas y los árboles crea un espacio dinámico y cambiante que invita a la contemplación.', images: ['imagenes/arbolesytelas-1.png', 'imagenes/arbolesytelas-2.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        
        // DESIGN
        { id: 'carteleria', category: 'design', title: 'CARTELERÍA', normalImage: 'imagenes/carteles/carteleria-main.png', rolloverImage: 'imagenes/carteles/carteleria-main-rollover.png', description: 'Una colección de carteles diseñados para diversos eventos y propósitos, explorando la intersección entre tipografía, imagen y comunicación visual.', posterImages: [ 'imagenes/carteles/cartel-1.png', 'imagenes/carteles/cartel-2.png', 'imagenes/carteles/cartel-3.png', 'imagenes/carteles/cartel-4.png', 'imagenes/carteles/cartel-5.png' ] },
        { id: 'oneiros-lamp', category: 'design', title: 'ONEIROS LAMP', normalImage: 'imagenes/oneiros-main.png', rolloverImage: 'imagenes/oneiros-main-rollover.png', description: 'Descripción de Oneiros Lamp. Un diseño que explora la materialidad y la luz para crear atmósferas oníricas.', images: ['imagenes/oneiros-1.png'], pdf: null },
        { id: 'estuche', category: 'design', title: 'ESTUCHE V1 V2 V3', normalImage: 'imagenes/estuche-main.png', rolloverImage: 'imagenes/estuche-main-rollover.png', description: 'Serie de estuches que combinan funcionalidad y estética minimalista, explorando diferentes materiales y formas.', images: ['imagenes/estuche-1.png'], pdf: null },
        { id: 'natural-lamp', category: 'design', title: 'NATURAL LAMP', normalImage: 'imagenes/natural-main.png', rolloverImage: 'imagenes/natural-main-rollover.png', description: 'Lámpara diseñada con materiales orgánicos y sostenibles, buscando una conexión directa con la naturaleza.', images: ['imagenes/natural-1.png'], pdf: null },
        { id: 'juego-mesa-minutos', category: 'design', title: 'JUEGO DE MESA MINUTOS', normalImage: 'imagenes/placeholder-main.png', rolloverImage: 'imagenes/placeholder-main-rollover.png', description: 'Descripción del Juego de Mesa Minutos. Un proyecto de diseño lúdico y estratégico.', images: ['imagenes/placeholder-1.png'], pdf: null },
        { id: 'cmfx-walkman', category: 'design', title: 'CMFX WALKMAN', normalImage: 'imagenes/placeholder-main.png', rolloverImage: 'imagenes/placeholder-main-rollover.png', description: 'Diseño conceptual de un reproductor de música portátil con una estética retro-futurista.', images: ['imagenes/placeholder-1.png'], pdf: null },
        { id: 'coleccion-grabados', category: 'design', title: 'COLECCIÓN DE GRABADOS', normalImage: 'imagenes/placeholder-main.png', rolloverImage: 'imagenes/placeholder-main-rollover.png', description: 'Una serie de grabados que exploran técnicas tradicionales con un enfoque contemporáneo.', images: ['imagenes/placeholder-1.png'], pdf: null },
        
        // SCENOGRAPHY
        { id: 'festa-na-terra', category: 'escenografias', title: 'FESTA NA TERRA', normalImage: 'imagenes/festa-main.png', rolloverImage: 'imagenes/festa-main-rollover.png', description: 'Diseño escenográfico para el festival "Festa Na Terra", creando un espacio inmersivo que celebra la cultura y la tradición.', images: ['imagenes/festa-1.png'], pdf: null },
        { id: 'cronologia-adios', category: 'escenografias', title: 'CRONOLOGÍA DE UN ADIÓS', normalImage: 'imagenes/cronologia-main.png', rolloverImage: 'imagenes/cronologia-main-rollover.png', description: 'Escenografía para una obra de teatro que explora el paso del tiempo y la memoria a través de una cuidada puesta en escena.', images: ['imagenes/cronologia-1.png'], pdf: null }
      ];


      // COMPONENTS
      const EyeIcon = ({ mousePosition }) => {
        const [pupilTransform, setPupilTransform] = React.useState('translate(0, 0)');

        React.useEffect(() => {
            if (!mousePosition) return;

            const maxPupilOffset = 15;
            const { x, y } = mousePosition;

            const angle = Math.atan2(y, x);
            
            const screenHypot = Math.sqrt(window.innerWidth * window.innerWidth + window.innerHeight * window.innerHeight) / 2;
            const mouseHypot = Math.sqrt(x * x + y * y);
            const normalizedDistance = Math.min(mouseHypot, screenHypot);
            
            const pupilX = Math.cos(angle) * maxPupilOffset * (normalizedDistance / screenHypot);
            const pupilY = Math.sin(angle) * maxPupilOffset * (normalizedDistance / screenHypot);
            
            setPupilTransform(`translate(${pupilX}, ${pupilY})`);
        }, [mousePosition]);

        return (
            <svg width="200" height="200" viewBox="-100 -100 200 200">
              <defs>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3.5" result="coloredBlur" />
                  <feMerge>
                    <feMergeNode in="coloredBlur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              <g opacity="0.15">
                <path d="M 0 -80 C 40 -40, 40 40, 0 80 C -40 40, -40 -40, 0 -80 Z" fill="white" transform="rotate(45)"/>
                <path d="M 0 -80 C 40 -40, 40 40, 0 80 C -40 40, -40 -40, 0 -80 Z" fill="white" transform="rotate(-45)"/>
              </g>
              <g>
                <path d="M 0 -70 L 70 0 L 0 70 L -70 0 Z" fill="#333333" stroke="gray" strokeWidth="0.5"/>
              </g>
              <g filter="url(#glow)" transform={pupilTransform} style={{ transition: 'transform 0.2s ease-out' }}>
                <circle cx="0" cy="0" r="45" fill="#555555" />
                <circle cx="0" cy="0" r="30" fill="#888888" />
                <circle cx="0" cy="0" r="15" fill="#CCCCCC" />
                <circle cx="0" cy="0" r="7" fill="white" />
              </g>
            </svg>
        );
      };

      const HomeButton = ({ onClick }) => (
        <button
            onClick={onClick}
            className="fixed top-4 right-4 z-50 w-12 h-12 bg-black bg-opacity-50 rounded-full flex items-center justify-center text-white backdrop-blur-sm border border-gray-700 transition-all duration-300 hover:bg-opacity-75 hover:border-gray-500 hover:scale-110"
            aria-label="Volver al inicio"
        >
            <svg width="24" height="24" viewBox="-50 -50 100 100">
                <g opacity="0.6">
                    <path d="M 0 -40 C 20 -20, 20 20, 0 40 C -20 20, -20 -20, 0 -40 Z" fill="white" transform="rotate(45)"/>
                    <path d="M 0 -40 C 20 -20, 20 20, 0 40 C -20 20, -20 -20, 0 -40 Z" fill="white" transform="rotate(-45)"/>
                </g>
                <g>
                    <circle cx="0" cy="0" r="10" fill="white" />
                </g>
            </svg>
        </button>
      );

      const BackButton = ({ onClick, theme = 'dark' }) => {
          const baseClasses = "fixed top-4 left-4 z-50 font-mono uppercase tracking-widest text-sm px-4 py-2 rounded-full border transition-all duration-300";
          const themeClasses = theme === 'dark'
              ? "text-white bg-black bg-opacity-30 backdrop-blur-sm border-gray-700 hover:bg-opacity-50 hover:border-gray-500"
              : "text-black bg-white bg-opacity-50 backdrop-blur-sm border-gray-300 hover:bg-opacity-80 hover:border-gray-500";
          
          return (
              <button onClick={onClick} className={`${baseClasses} ${themeClasses}`}>
                  &larr; Volver
              </button>
          );
      };

      const NetworkGraph = ({ onNodeClick, filter }) => {
        const svgRef = React.useRef(null);
        const simulationRef = React.useRef(null);

        React.useEffect(() => {
          if (!svgRef.current) return;
          
          const isMobile = window.innerWidth < 768;
          const width = window.innerWidth;
          const height = window.innerHeight;
          
          // --- Data Filtering Logic ---
          const baseNodesRaw = [
            { id: 'CENTRAL_HUB', group: 0, isCentral: true, fx: 0, fy: 0 },
            { id: 'ARQUITECTURA', group: 1, isNavLink: true },
            { id: 'DISEÑO', group: 2, isNavLink: true },
            { id: 'ESCENOGRAFÍAS', group: 2, isNavLink: true },
            { id: 'CONTACTO', group: 2, isNavLink: true },
            { id: 'DOCENCIA', group: 2 }, { id: 'TRABAJO', group: 2 }, { id: 'INVESTIGACIÓN', group: 2 }, { id: 'EXPRESION ARTISTICA', group: 2 }, { id: 'Fotografía de la luz', group: 3 }, { id: 'I+D', group: 3 }, { id: 'Interiorismo', group: 3 },
          ];

          const baseLinksRaw = [
            { source: 'CENTRAL_HUB', target: 'ARQUITECTURA', value: 1 }, { source: 'CENTRAL_HUB', target: 'DISEÑO', value: 1 }, { source: 'CENTRAL_HUB', target: 'ESCENOGRAFÍAS', value: 1 }, { source: 'CENTRAL_HUB', target: 'CONTACTO', value: 1 }, { source: 'ARQUITECTURA', target: 'DOCENCIA', value: 1 }, { source: 'ARQUITECTURA', target: 'TRABAJO', value: 1 }, { source: 'ARQUITECTURA', target: 'INVESTIGACIÓN', value: 1 }, { source: 'ARQUITECTURA', target: 'EXPRESION ARTISTICA', value: 1 }, { source: 'INVESTIGACIÓN', target: 'I+D', value: 2 }, { source: 'EXPRESION ARTISTICA', target: 'Fotografía de la luz', value: 2 }, { source: 'EXPRESION ARTISTICA', target: 'Interiorismo', value: 2 },
          ];

          const getSourceNode = (category) => {
            switch(category) {
              case 'architecture': return 'ARQUITECTURA';
              case 'design': return 'DISEÑO';
              case 'escenografias': return 'ESCENOGRAFÍAS';
              default: return 'DISEÑO';
            }
          };
          
          let nodesData = [];
          let linksData = [];

          if (filter === 'all') {
              const shouldHideProjects = isMobile;
              nodesData = [...baseNodesRaw];
              linksData = [...baseLinksRaw];
              if (!shouldHideProjects) {
                  const projectNodes = allProjectsData.map(p => ({ id: p.title, group: 4, isNavLink: true, isProject: true, projectId: p.id }));
                  const projectLinks = allProjectsData.map(p => ({ source: getSourceNode(p.category), target: p.title, value: 5 }));
                  nodesData.push(...projectNodes);
                  linksData.push(...projectLinks);
              }
          } else {
              const categoryMap = { 'architecture': 'ARQUITECTURA', 'design': 'DISEÑO', 'escenografias': 'ESCENOGRAFÍAS' };
              const categoryName = categoryMap[filter];
              if (categoryName) {
                  const categoryProjects = allProjectsData.filter(p => p.category === filter);
                  const projectNodes = categoryProjects.map(p => ({ id: p.title, group: 4, isNavLink: true, isProject: true, projectId: p.id }));
                  const projectLinks = categoryProjects.map(p => ({ source: categoryName, target: p.title, value: 5 }));

                  nodesData = [
                      { id: 'CENTRAL_HUB', group: 0, isCentral: true, fx: 0, fy: 0 },
                      { id: categoryName, group: 1, isNavLink: true },
                      ...projectNodes
                  ];
                  linksData = [
                      { source: 'CENTRAL_HUB', target: categoryName, value: 1 },
                      ...projectLinks
                  ];
              }
          }
          // --- End Data Filtering ---
          
          const visibleNodes = nodesData.filter(n => n.id !== 'CENTRAL_HUB');

          const svg = d3.select(svgRef.current)
            .attr('width', width)
            .attr('height', height)
            .attr('viewBox', [-width / 2, -height / 2, width, height]);

          svg.selectAll("*").remove(); 

          if (simulationRef.current) {
            simulationRef.current.stop();
          }

          const simulation = d3.forceSimulation(nodesData)
            .force('link', d3.forceLink(linksData).id(d => d.id).distance(d => isMobile ? (d.value === 5 ? 60 : 100) : (d.value === 5 ? 100 : 180)))
            .force('charge', d3.forceManyBody().strength(isMobile ? -120 : -180))
            .force('center', d3.forceCenter(0, 0));
          
          simulationRef.current = simulation;

          svg.append('circle').attr('cx', 0).attr('cy', 0).attr('r', Math.min(width, height) / 2 - 40).attr('stroke', 'rgba(255, 255, 255, 0.1)').attr('stroke-width', 1).attr('fill', 'none');

          const link = svg.append('g').attr('stroke', '#666').attr('stroke-opacity', 0).selectAll('line').data(linksData).join('line').attr('class', 'animated-link').attr('stroke-width', d => d.value === 5 ? 0.5 : Math.sqrt(d.value));
          link.transition().duration(1000).delay(500).attr('stroke-opacity', 0.6);

          const node = svg.append('g').selectAll('g').data(visibleNodes).join('g')
            .style('cursor', d => d.isNavLink ? 'pointer' : 'default')
            .on('click', (event, d) => {
                if (!d.isNavLink) return;
                event.preventDefault();
                event.stopPropagation();
                onNodeClick(d);
            })
            .call(d3.drag()
                .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0.01); d.fx = null; d.fy = null; }));

          const getNodeColor = (d) => d.isNavLink && !d.isProject ? '#fff' : (d.isProject ? '#aaa' : '#777');

          node.on('mouseover', function(event, d) {
            if (d.isNavLink) {
              d3.select(this).select('text').transition().duration(200).attr('fill', '#00ffff');
              d3.select(this).select('circle').transition().duration(200).attr('fill', '#00ffff').attr('r', d.isNavLink && !d.isProject ? 10 : (d.isProject ? (isMobile ? 4 : 5) : 6));
            }
          }).on('mouseout', function(event, d) {
            if (d.isNavLink) {
              d3.select(this).select('text').transition().duration(200).attr('fill', getNodeColor(d));
              d3.select(this).select('circle').transition().duration(200).attr('fill', '#999').attr('r', d.isNavLink && !d.isProject ? 8 : (d.isProject ? (isMobile ? 2 : 3) : 5));
            }
          });
                
          node.append('circle').attr('r', d => d.isNavLink && !d.isProject ? 8 : (d.isProject ? (isMobile ? 2 : 3) : 5)).attr('fill', '#999').attr('stroke', '#fff').attr('stroke-width', 1.5);
          
          node.append('text').text(d => d.id).attr('x', d => d.isProject ? (isMobile ? 6 : 10) : 12).attr('y', 4).attr('fill', getNodeColor)
            .style('font-size', d => d.isNavLink && !d.isProject ? (isMobile ? '1.1rem' : '1.4rem') : (d.isProject ? (isMobile ? '0.65rem' : '0.8rem') : '0.8rem'))
            .style('text-transform', 'uppercase').style('letter-spacing', '0.1em');

          node.style('opacity', 0)
            .attr('transform', 'scale(0.1)')
            .transition()
            .duration(1000)
            .delay((d, i) => i * 15)
            .style('opacity', 1)
            .attr('transform', 'scale(1)');

          simulation.on('tick', () => {
              const orbitalStrength = 0.001;
              nodesData.forEach(d => {
                  if (!d.isCentral) {
                      d.vx -= d.y * orbitalStrength;
                      d.vy += d.x * orbitalStrength;
                  }
              });

              const margin = isMobile ? 20 : 40;
              node.attr('transform', d => {
                  const nodeRadius = 10;
                  const textWidthEstimate = 160; 
                  
                  const leftBound = -width / 2 + margin + nodeRadius;
                  const rightBound = width / 2 - margin - textWidthEstimate;
                  const topBound = -height / 2 + margin + nodeRadius;
                  const bottomBound = height / 2 - margin - nodeRadius;
                  
                  d.x = Math.max(leftBound, Math.min(rightBound, d.x));
                  d.y = Math.max(topBound, Math.min(bottomBound, d.y));

                  return `translate(${d.x || 0}, ${d.y || 0})`;
              });
              link.attr('x1', d => d.source.x || 0).attr('y1', d => d.source.y || 0).attr('x2', d => d.target.x || 0).attr('y2', d => d.target.y || 0);
          });
          
          simulation.alpha(0.3).restart();
          
          return () => { simulation.stop(); };
        }, [onNodeClick, filter]);

        return <svg ref={svgRef} className="w-full h-full" />;
      };
      
      const OrbitalPage = ({ category, title, onProjectSelect }) => {
        const svgRef = React.useRef(null);

        React.useEffect(() => {
            if (!svgRef.current) return;
            
            const projects = allProjectsData.filter(p => p.category === category);
            
            const isMobile = window.innerWidth < 768;
            const width = window.innerWidth;
            const height = window.innerHeight;

            const baseNodes = [
                { id: title, isSun: true, fx: 0, fy: 0 }
            ];

            const projectNodes = projects.map(p => ({ id: p.title, isProject: true, projectId: p.id, sun: title }));
            
            projectNodes.forEach(node => {
                node.x = 0;
                node.y = 0;
            });
            
            const nodesData = [...baseNodes, ...projectNodes];
            const linksData = projectNodes.map(p => ({ source: p.sun, target: p.id }));

            const svg = d3.select(svgRef.current)
                .attr('width', width)
                .attr('height', height)
                .attr('viewBox', [-width / 2, -height / 2, width, height]);
            svg.selectAll("*").remove(); 

            const simulation = d3.forceSimulation(nodesData)
                .force('link', d3.forceLink(linksData).id(d => d.id).distance(isMobile ? 100 : 150).strength(0.5))
                .force('charge', d3.forceManyBody().strength(d => d.isSun ? (isMobile ? -1000 : -2000) : (isMobile ? -100 : -130)))
                .force('center', d3.forceCenter(0, 0))
                .force('collide', d3.forceCollide().radius(d => d.isSun ? 70 : 45));

            const link = svg.append('g').attr('stroke', '#666').attr('stroke-opacity', 0).selectAll('line').data(linksData).join('line').attr('class', 'animated-link').attr('stroke-width', 0.5);
            link.transition().duration(1000).delay(800).attr('stroke-opacity', 0.4);

            const node = svg.append('g').selectAll('g').data(nodesData).join('g')
                .style('cursor', d => d.isProject ? 'pointer' : 'default')
                .on('click', (event, d) => {
                    if (d.isProject) onProjectSelect(d.projectId);
                });

            const sunNodes = node.filter(d => d.isSun).classed('sun-node', true);
            sunNodes.append('text').text(d => d.id)
                .attr('text-anchor', 'middle')
                .attr('y', 5)
                .attr('fill', '#fff')
                .style('font-size', isMobile ? '1.8rem' : '2.5rem')
                .style('font-family', "'Cormorant Garamond', serif")
                .style('text-transform', 'uppercase')
                .style('letter-spacing', '0.1em');

            const projectNodeGroups = node.filter(d => d.isProject);
            projectNodeGroups.append('circle').attr('r', isMobile ? 5 : 3).attr('fill', '#999').attr('stroke', '#fff').attr('stroke-width', 1.5);
            
            const projectTexts = projectNodeGroups.append('text').text(d => d.id)
                .attr('y', 4)
                .attr('fill', '#aaa')
                .style('font-size', isMobile ? '0.9rem' : '0.8rem')
                .style('text-transform', 'uppercase');
            
            projectNodeGroups.on('mouseover', function() {
                d3.select(this).select('text').transition().duration(200).attr('fill', '#00ffff');
                d3.select(this).select('circle').transition().duration(200).attr('fill', '#00ffff').attr('r', isMobile ? 7 : 5);
            }).on('mouseout', function() {
                d3.select(this).select('text').transition().duration(200).attr('fill', '#aaa');
                d3.select(this).select('circle').transition().duration(200).attr('fill', '#999').attr('r', isMobile ? 5 : 3);
            });

            node.call(d3.drag()
                .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); if (!d.isSun) { d.fx = null; d.fy = null; } }));

            node.style('opacity', 0)
                .transition()
                .duration(1200)

                .style('opacity', 1);

                const margin = isMobile ? 10 : 20;
                const textOffset = 12;

                node.each(d => {
                    d.x = Math.max(-width/2 + margin, Math.min(width/2 - margin, d.x));
                    d.y = Math.max(-height/2 + margin, Math.min(height/2 - margin, d.y));
                });

                node.attr('transform', d => `translate(${d.x || 0}, ${d.y || 0})`);

                projectTexts
                  .attr('x', d => (d.x || 0) >= 0 ? textOffset : -textOffset)
                  .attr('text-anchor', d => (d.x || 0) >= 0 ? 'start' : 'end');
            });

            return () => simulation.stop();
        }, [category, title, onProjectSelect]);

      const InteractiveGridBackground = () => {
        const [mousePos, setMousePos] = React.useState({ x: -9999, y: -9999 });

        React.useEffect(() => {
            const handleMouseMove = (event) => {
                setMousePos({ x: event.clientX, y: event.clientY });
            };
            window.addEventListener('mousemove', handleMouseMove);
            return () => window.removeEventListener('mousemove', handleMouseMove);
        }, []);

        const memoizedDots = React.useMemo(() => {
            const dots = [];
            const gridSize = 50;
            const numCols = Math.ceil(window.innerWidth / gridSize);
            const numRows = Math.ceil(window.innerHeight / gridSize);

            for (let i = 0; i < numCols; i++) {
                for (let j = 0; j < numRows; j++) {
                    const x = i * gridSize;
                    const y = j * gridSize;
                    const dx = x - mousePos.x;
                    const dy = y - mousePos.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    const maxDist = 250;
                    const influence = Math.max(0, 1 - dist / maxDist);
                    
                    const displacement = influence * 15;
                    const finalX = x - (dx / dist) * displacement;
                    const finalY = y - (dy / dist) * displacement;
                    
                    const opacity = 0.05 + influence * 0.4;

                    dots.push({
                        key: `${i}-${j}`,
                        cx: finalX,
                        cy: finalY,
                        r: 1,
                        opacity: opacity,
                    });
                }
            }
            return dots;
        }, [mousePos.x, mousePos.y]);


        return (
            <svg className="fixed top-0 left-0 w-full h-full z-0 pointer-events-none">
                <g>
                    {memoizedDots.map(dot => (
                        <circle 
                            key={dot.key} 
                            cx={dot.cx} 
                            cy={dot.cy} 
                            r={dot.r} 
                            fill="#00ffff" 
                            fillOpacity={dot.opacity}
                            style={{ transition: 'cx 0.1s ease-out, cy 0.1s ease-out, fill-opacity 0.1s ease-out' }}
                        />
                    ))}
                </g>
            </svg>
        );

                        'escenografias': 'scenography'
                    };
                    setView({ page: pageMap[project.category] || 'home', projectId: null });
                } else {
                    handleGoHome(); // Fallback
                }
            } else if (['architecture', 'design', 'scenography', 'contact'].includes(view.page)) {
                handleGoHome();
            }
        };

        const renderContent = () => {
          switch (view.page) {
            case 'home':
              return (
                <div className="w-full h-full flex items-center justify-center relative">
                  <div className="central-eye absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-0">
                    <EyeIcon mousePosition={mousePosition} />
                  </div>
                  <div className="absolute top-0 left-0 w-full h-full z-10"><NetworkGraph onNodeClick={handleNodeClick} filter={filter} /></div>
                  <div className="absolute bottom-4 left-1/2 -translate-x-1/2 text-sm text-gray-500 z-20">Portfolio d3 benito</div>
                </div>
              );
            case 'architecture':
              return <ArchitecturePage onProjectSelect={handleProjectSelect} />;
            case 'design':
              return <OrbitalPage category="design" title="DISEÑO" onProjectSelect={handleProjectSelect} />;
            case 'scenography':
              return <OrbitalPage category="escenografias" title="ESCENOGRAFÍAS" onProjectSelect={handleProjectSelect} />;
            case 'contact':
              return <ContactPage />;
            case 'carteleria': {
                const project = allProjectsData.find(p => p.id === view.projectId);
                return <CarteleriaPage project={project} />;
            }
            case 'project':
              const project = allProjectsData.find(p => p.id === view.projectId);
              return <ProjectDetailPage project={project} allProjectsData={allProjectsData} onProjectSelect={handleProjectSelect} />;
            default:
              return null;
          }
        }

        return (
          <div className="w-full h-full">
            {view.page === 'home' && <FilterControls currentFilter={filter} onFilterChange={handleFilterChange} />}
            {view.page !== 'home' && <HomeButton onClick={handleGoHome} />}
            {view.page !== 'home' && <BackButton onClick={handleBack} theme={view.page === 'project' ? 'light' : 'dark'} />}
            {renderContent()}
          </div>
        );
      };

      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
      }

    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
