    <script type="text/babel">
      // DATA STORE
      const allProjectsData = [
        // ARCHITECTURE
        { id: 'paseo-dehesa', category: 'architecture', title: 'PASEO DEHESA', normalImage: 'imagenes/paseodehesa-main.png', rolloverImage: 'imagenes/paseodehesa-main-rollover.png', summary: 'Intervención paisajística en La Dehesa de la Villa para conectar el norte y sur del parque. Propone tres estaciones (servicios, meteorológica, mirador) para reactivar la zona sur y crear espacios de refugio y reunión.', description: 'Intervención Paisajistica en La Dehesa de la Villa\nArchitectural Paisajism\nEl ejercicio solicita la instalación de tres estaciones con el objetivo de readaptar el nexo sur de la dehesa de la villa y aportar usos y apoyos al lugar.\n\nLos requerimientos esenciales establecidos en el ejercicio son:\n\n- una estación de servicios\n\n- una estación metereológica\n\n- un mirador\n\nLa implantación de estas piezas será ubicada en el lugar en relación con su derredor, fomentando el desarrollo del entorno más allá de su función inmediata. El ejercicio lo he abordado mediante una gran estructuración en dos partes. Una primera que estudia, traza y justifica un plan general que deduzca el cómo y el porqué de cada estación. Una red de infraestructura. El objetivo principal de mi intervención es conectar el norte del parque (espacio hoy en día más concurrido) con el sur, espacio colindante con las universidadesl. Readaptar el espacio que hoy en día es usado como “trastero de la dehesa”. Buscar el refugio en el entorno inmediato de la urbe. Crear espacios de reunión y evasión, (cómo) volcándose sobre sí mismo y reforzando ese carácter de pulmón verde que la dehesa debería de constituir.\n\nEste proyecto comienza siendo una geometría desordenada de planos trazados a mano alzada. Posteriormente, se le impone una geometría basada en circunferencias de cinco radios distintos y tangencias entre ellas. Para ordenar las geometrías, se disponen de forma ordenada y atendiendo a los usos que estas albergarán. Una vez distribuidas en la parcela, se le superpone una retícula de pilares.', images: ['imagenes/paseodehesa-1.png', 'imagenes/paseodehesa-2.png', 'imagenes/paseodehesa-3.png', 'imagenes/paseodehesa-4.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        { id: 'el-escorial', category: 'architecture', title: 'COCINA MONACAL DE EL ESCORIAL', normalImage: 'imagenes/elescorial-main.png', rolloverImage: 'imagenes/elescorial-main-rollover.png', summary: 'Investigación sobre la disposición original y evolución de la cocina del Monasterio del Escorial, basada en análisis documental de tratados renacentistas y estudios comparativos de cocinas monásticas.', description: 'Investigación Arquitectónica\nEl objetivo principal de este estudio es formular una hipótesis objetiva sobre la disposición y características originales de la cocina del Monasterio del Escorial en el momento de su construcción, así como explorar su evolución a lo largo del tiempo. Para abordar esta investigación, se desarrolló una metodología en varias fases, comenzando con un exhaustivo análisis documental centrado en ejemplos históricos y contemporáneos comparables.\n\nEn la primera fase, se revisaron tratados y grabados de la época, como el "Libro de Cozina" de Bartolomeo Scappi y los tratados de Bartolomeo Banchetti, los cuales detallan las necesidades funcionales de las cocinas renacentistas, así como la disposición y uso de utensilios comunes. Estos documentos proporcionaron un marco de referencia inicial sobre cómo se organizaban los espacios culinarios en contextos similares.\n\nPosteriormente, se profundizó en la investigación consultando trabajos académicos relevantes, como el Trabajo Fin de Grado de Alberto Pretianni, que analiza tres casos de estudio que guardan semejanzas con la cocina del Escorial: la cocina del Monasterio de Fontevraud, la de la Conciergerie en París y la villa de Poggioreale en Italia. De estos estudios, se extrajeron valiosas conclusiones sobre los métodos de extracción de humo, un aspecto crucial en la funcionalidad de las cocinas monásticas de la época.\n\nAdemás, se estudiaron las cocinas de otros monasterios como los de Sintra y Alcobaça, para identificar posibles métodos de higienización del espacio, un aspecto fundamental para entender la operatividad y mantenimiento de estas áreas en contextos históricos.\n\nCon todos estos datos, se han formulado varias hipótesis sobre la posible distribución y organización del espacio en la cocina del Monasterio del Escorial, tomando en cuenta las actividades culinarias que se desarrollaban y las necesidades funcionales del momento. Este estudio ofrece una visión detallada y fundamentada de cómo pudo haber sido este importante espacio, y cómo su diseño pudo haber evolucionado con el tiempo.', images: ['imagenes/elescorial-1.png', 'imagenes/elescorial-2.png', 'imagenes/elescorial-3.png', 'imagenes/elescorial-4.png', 'imagenes/elescorial-5.png', 'imagenes/elescorial-6.png', 'imagenes/elescorial-7.png', 'imagenes/elescorial-8.png', 'imagenes/elescorial-9.png', 'imagenes/elescorial-10.png', 'imagenes/elescorial-11.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        { id: 'ia-render', category: 'architecture', title: 'RENDERIZADO IA', normalImage: 'imagenes/iarender-main.png', rolloverImage: 'imagenes/iarender-main-rollover.png', summary: 'Exploración conceptual de cómo la IA expande los horizontes del diseño arquitectónico, manifestando visualmente las posibilidades estéticas que emergen al colaborar con algoritmos generativos.', description: 'Una exploración conceptual sobre cómo las herramientas de inteligencia artificial pueden expandir los horizontes del diseño arquitectónico. Este proyecto no representa una construcción física, sino un manifiesto visual de las posibilidades estéticas y formales que emergen al colaborar con algoritmos generativos.', images: ['imagenes/iarender-1.png', 'imagenes/iarender-2.png', 'imagenes/iarender-3.png', 'imagenes/iarender-4.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        { id: 'coleccion-de-curvas', category: 'architecture', title: 'COLECCIÓN DE CURVAS', normalImage: 'imagenes/colecciondecurvas-main.png', rolloverImage: 'imagenes/colecciondecurvas-main-rollover.png', summary: 'Diseño de oficinas como un paisaje de usos, creando estancias delimitadas por espacios verdes. La geometría se basa en circunferencias y tangencias ordenadas en una retícula para mejorar la calidad del trabajo.', description: 'El proyecto “Colección de curvas” busca dibujar un paisaje de usos, unas oficinas que sean paisaje y una experiencia para el día a día. Crear una vorágine de estancias delimitadas entre sí mediante espacios verdes, terrazas y callejones. El objetivo es proyectar unas oficinas que mejoren la calidad del trabajo o hagan de este una parte cómoda de la rutina. Para lograr todo esto, buscamos combinar una serie de espacios, con formas de habitarlos flexibles a la par que específicas. Este proyecto comienza siendo una geometría desordenada de planos trazados a mano alzada. Posteriormente, se le impone una geometría basada en circunferencias de cinco radios distintos y tangencias entre ellas. Para ordenar las geometías, se disponen de forma ordenada y atendiendo a los usos que estas albergarán. Una vez distribuidas en la parcela, se le superpone una retícula de pilares.', images: ['imagenes/colecciondecurvas-1.png', 'imagenes/colecciondecurvas-2.png', 'imagenes/colecciondecurvas-3.png', 'imagenes/colecciondecurvas-4.png', 'imagenes/colecciondecurvas-5.png', 'imagenes/colecciondecurvas-6.png', 'imagenes/colecciondecurvas-7.png', 'imagenes/colecciondecurvas-8.png', 'imagenes/colecciondecurvas-9.png', 'imagenes/colecciondecurvas-10.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        { id: 'arboles-y-telas', category: 'architecture', title: 'ÁRBOLES Y TELAS', normalImage: 'imagenes/arbolesytelas-main.png', rolloverImage: 'imagenes/arbolesytelas-main-rollover.png', summary: 'Centro social en Pereira, Colombia, diseñado para la multifuncionalidad de los espacios, buscando minimizar el desuso y permitir que las áreas alberguen diversas actividades más allá de su función principal.', description: 'Centro social en Pereira, Colombia\nArchitectural Design\nEs un proyecto desarroyado para la asignatura de proyectos 5\nEl objetivo de este proyecto reside en la multifunción de los espacios, buscando minimizar el espacio en desuso. Es decir, que los espacios puedan albergar actividades auna vez su función principal haya terminado', images: ['imagenes/arbolesytelas-1.png', 'imagenes/arbolesytelas-2.png', 'imagenes/arbolesytelas-3.png', 'imagenes/arbolesytelas-4.png', 'imagenes/arbolesytelas-5.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        { id: 'prato-food-city', category: 'architecture', title: 'PRATO FOOD CITY', normalImage: 'imagenes/prato-main.png', rolloverImage: 'imagenes/prato-main-rollover.png', summary: 'Erasmus+BIP en Italia. El proyecto "Ring of Prato" conecta áreas en desuso para transformarlas en tierras de cultivo, promoviendo la educación pública y la cultura gastronómica local.', description: 'Erasmus+BIP en Italia\n\nThe “The Ring of Prato” project emerges with the intention of connecting large unused areas through physical and visual connections. These spaces have significant potential to explore the richness of local gastronomic culture. The project’s vision is to transform these vast extensions into cultivated lands that promote public education.\n\nFurthermore, extensive green areas with different characteristics are observed, extending like branches around the current city, projected as zones for future urban growth. As a whole, this project forms a ring that embraces the current city, delineating spaces shared by society, where food and the rural environment take center stage and exploring new areas that allow future urban growth, prioritizing pedestrians.', images: ['imagenes/prato-1.png', 'imagenes/prato-2.png', 'imagenes/prato-3.png', 'imagenes/prato-4.png', 'imagenes/prato-5.png', 'imagenes/prato-6.png', 'imagenes/prato-7.png', 'imagenes/prato-8.png'], pdf: 'pdfs/portfolio-benito-quinones.pdf' },
        
        // DESIGN
        { id: 'carteleria', category: 'design', title: 'CARTELERÍA', normalImage: 'imagenes/carteles/carteleria-main.png', rolloverImage: 'imagenes/carteles/carteleria-main-rollover.png', summary: 'Colección de carteles diseñados para diversos eventos, explorando la intersección entre tipografía, imagen y comunicación visual.', description: 'Una colección de carteles diseñados para diversos eventos y propósitos, explorando la intersección entre tipografía, imagen y comunicación visual.', posterImages: [ 'imagenes/carteles/cartel-1.png', 'imagenes/carteles/cartel-2.png', 'imagenes/carteles/cartel-3.png', 'imagenes/carteles/cartel-4.png', 'imagenes/carteles/cartel-5.png', 'imagenes/carteles/cartel-6.png', 'imagenes/carteles/cartel-7.png', 'imagenes/carteles/cartel-8.png', 'imagenes/carteles/cartel-9.png', 'imagenes/carteles/cartel-10.png', 'imagenes/carteles/cartel-11.png', 'imagenes/carteles/cartel-12.png', 'imagenes/carteles/cartel-13.png', 'imagenes/carteles/cartel-14.png', 'imagenes/carteles/cartel-15.png', 'imagenes/carteles/cartel-16.png', 'imagenes/carteles/cartel-17.png', 'imagenes/carteles/cartel-18.png', 'imagenes/carteles/cartel-19.png', 'imagenes/carteles/cartel-20.png' ] },
        { id: 'generacion-ia', category: 'design', title: 'GENERACIÓN IA', isPage: true },
        { id: 'oneiros-lamp', category: 'design', title: 'ONEIROS LAMP', normalImage: 'imagenes/oneiros-main.png', rolloverImage: 'imagenes/oneiros-main-rollover.png', summary: 'Un diseño de lámpara que explora la materialidad y la luz para crear atmósferas oníricas.', description: 'Descripción de Oneiros Lamp. Un diseño que explora la materialidad y la luz para crear atmósferas oníricas.', images: ['imagenes/oneiros-1.png'], pdf: null },
        { id: 'estuche', category: 'design', title: 'ESTUCHE V1 V2 V3', normalImage: 'imagenes/estuche-main.png', rolloverImage: 'imagenes/estuche-main-rollover.png', summary: 'Serie de estuches que combinan funcionalidad y estética minimalista, explorando diferentes materiales y formas.', description: 'Serie de estuches que combinan funcionalidad y estética minimalista, explorando diferentes materiales y formas.', images: ['imagenes/estuche-1.png'], pdf: null },
        { id: 'natural-lamp', category: 'design', title: 'NATURAL LAMP', normalImage: 'imagenes/natural-main.png', rolloverImage: 'imagenes/natural-main-rollover.png', summary: 'Lámpara diseñada con materiales orgánicos y sostenibles, buscando una conexión directa con la naturaleza.', description: 'Lámpara diseñada con materiales orgánicos y sostenibles, buscando una conexión directa con la naturaleza.', images: ['imagenes/natural-1.png'], pdf: null },
        { id: 'juego-mesa-minutos', category: 'design', title: 'JUEGO DE MESA MINUTOS', normalImage: 'imagenes/minutos-main.png', rolloverImage: 'imagenes/minutos-main-rollover.png', summary: 'Un proyecto de diseño lúdico y estratégico para un juego de mesa.', description: 'Descripción del Juego de Mesa Minutos. Un proyecto de diseño lúdico y estratégico.', images: ['imagenes/minutos-1.png', 'imagenes/minutos-2.png', 'imagenes/minutos-3.png'], pdf: null },
        { id: 'cmfx-walkman', category: 'design', title: 'CMFX WALKMAN', normalImage: 'imagenes/cmfx-walkman-main.png', rolloverImage: 'imagenes/cmfx-walkman-main-rollover.png', summary: 'Concepto de funda modular para teléfono CMF inspirada en el Sony Walkman, que funciona como billetera y fusiona una estética retro con una funcionalidad moderna.', description: 'CONCEPT DESING FOR NOTHING\nDesing\nEste diseño se basa en la innovadora idea de crear un módulo para el teléfono móvil CMF que también funcione como una billetera, inspirado en el legendario Sony Walkman. El CMF es un dispositivo modular que permite atornillar diferentes módulos en su parte trasera, ofreciendo una gran flexibilidad y personalización. Mi propuesta busca capturar la esencia nostálgica del Walkman, integrando elementos de diseño con transparencias y geometrías que se alinean perfectamente con la estética de Nothing.\n\nEl estuche modular no solo protege el teléfono y almacena tus pertenencias, sino que también se convierte en una expresión de estilo y funcionalidad. Las transparencias permiten un vistazo intrigante a su interior, mientras que las formas geométricas añaden un toque moderno que complementa la tecnología avanzada del CMF. Este diseño fusiona lo retro con lo contemporáneo, creando un producto que es tanto práctico como visualmente atractivo.\n\nActualmente, estoy trabajando en el desarrollo de los modelos 3D para este módulo. Creo que sería interesante organizar un concurso para alentar a la comunidad a personalizar y modificar el diseño, explorando nuevas posibilidades que reflejen la filosofía de Nothing.', images: ['imagenes/cmfx-walkman-1.png', 'imagenes/cmfx-walkman-2.png'], pdf: null },
        { id: 'coleccion-grabados', category: 'design', title: 'COLECCIÓN DE GRABADOS', normalImage: 'imagenes/grabados-main.png', rolloverImage: 'imagenes/grabados-main-rollover.png', summary: 'Una serie de grabados que exploran técnicas tradicionales con un enfoque contemporáneo.', description: 'Una serie de grabados que exploran técnicas tradicionales con un enfoque contemporáneo.', images: ['imagenes/grabados-1.png'], pdf: null },

        { id: 'cronologia-adios', category: 'escenografias', title: 'CRONOLOGÍA DE UN ADIÓS', normalImage: 'imagenes/cronologia-main.png', rolloverImage: 'imagenes/cronologia-main-rollover.png', summary: 'Escenografía para una obra de teatro que explora el paso del tiempo y la memoria a través de una cuidada puesta en escena.', description: 'Escenografía para una obra de teatro que explora el paso del tiempo y la memoria a través de una cuidada puesta en escena.', images: ['imagenes/cronologia-1.png'], pdf: null }

      // COMPONENTS
      const EyeIcon = ({ mousePosition }) => {
        const [pupilTransform, setPupilTransform] = React.useState('translate(0, 0)');

        React.useEffect(() => {
            const isMobile = window.matchMedia("(hover: none) and (pointer: coarse)").matches || window.innerWidth < 768;

            if (isMobile) {
                const handleOrientation = (event) => {
                    const { beta, gamma } = event; // beta: front-to-back, gamma: left-to-right
                    if (beta === null || gamma === null) return;
                    
                    const maxPupilOffset = 15;
                    // Normalize gamma and beta to a range of [-1, 1] and apply offset
                    const pupilX = Math.max(-1, Math.min(1, gamma / 45)) * maxPupilOffset;
                    // Subtract 45 from beta to make the eye look forward when the phone is held at a natural angle
                    const pupilY = Math.max(-1, Math.min(1, (beta - 45) / 45)) * maxPupilOffset;
                    
                    setPupilTransform(`translate(${pupilX}, ${pupilY})`);
                };

                window.addEventListener('deviceorientation', handleOrientation);
                return () => window.removeEventListener('deviceorientation', handleOrientation);
            } else {
                if (!mousePosition) return;
                const maxPupilOffset = 15;
                const { x, y } = mousePosition;
                const angle = Math.atan2(y, x);
                const screenHypot = Math.sqrt(window.innerWidth * window.innerWidth + window.innerHeight * window.innerHeight) / 2;
                const mouseHypot = Math.sqrt(x * x + y * y);
                const normalizedDistance = Math.min(mouseHypot, screenHypot);
                const pupilX = Math.cos(angle) * maxPupilOffset * (normalizedDistance / screenHypot);
                const pupilY = Math.sin(angle) * maxPupilOffset * (normalizedDistance / screenHypot);
                setPupilTransform(`translate(${pupilX}, ${pupilY})`);
            }
        }, [mousePosition]);

        return (
            <svg width="200" height="200" viewBox="-100 -100 200 200">
              <defs>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3.5" result="coloredBlur" />
                  <feMerge>
                    <feMergeNode in="coloredBlur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>
              <g opacity="0.15">
                <path d="M 0 -80 C 40 -40, 40 40, 0 80 C -40 40, -40 -40, 0 -80 Z" fill="white" transform="rotate(45)"/>
                <path d="M 0 -80 C 40 -40, 40 40, 0 80 C -40 40, -40 -40, 0 -80 Z" fill="white" transform="rotate(-45)"/>
              </g>
              <g>
                <path d="M 0 -70 L 70 0 L 0 70 L -70 0 Z" fill="#333333" stroke="gray" strokeWidth="0.5"/>
              </g>
              <g filter="url(#glow)" transform={pupilTransform} style={{ transition: 'transform 0.2s ease-out' }}>
                <circle cx="0" cy="0" r="45" fill="#555555" />
                <circle cx="0" cy="0" r="30" fill="#888888" />
                <circle cx="0" cy="0" r="15" fill="#CCCCCC" />
                <circle cx="0" cy="0" r="7" fill="white" />
              </g>
            </svg>
        );
      };

      const NetworkGraph = ({ onNodeClick, filter }) => {
        const svgRef = React.useRef(null);

        const [tooltip, setTooltip] = React.useState({ visible: false, content: '', x: 0, y: 0 });

        React.useEffect(() => {
          if (!svgRef.current) return;
          
          const isMobile = window.innerWidth < 768;
          const width = window.innerWidth;
          const height = window.innerHeight;

          const categorySummaries = {
            'ARQUITECTURA': 'Proyectos que exploran la relación entre el espacio, la forma y la función.',
            'DISEÑO': 'Creación de objetos y experiencias visuales, desde carteles hasta productos.',
            'ESCENOGRAFÍAS': 'Diseño de ambientes y atmósferas para contar historias en el espacio.'
          };
          
          // --- Data Filtering Logic ---
          const baseNodesRaw = [
            { id: 'CENTRAL_HUB', group: 0, isCentral: true, fx: 0, fy: 0 },
            { id: 'ARQUITECTURA', group: 1, isNavLink: true },
            { id: 'DISEÑO', group: 2, isNavLink: true },
            { id: 'ESCENOGRAFÍAS', group: 2, isNavLink: true },
            { id: 'CONTACTO', group: 2, isNavLink: true },

      const InteractiveGridBackground = ({ theme = 'dark' }) => {
        const [centerPos, setCenterPos] = React.useState({ x: -9999, y: -9999 });
        const dotColor = theme === 'dark' ? '#00ffff' : '#cccccc';

        React.useEffect(() => {
            const isMobile = window.matchMedia("(hover: none) and (pointer: coarse)").matches || window.innerWidth < 768;

            if (isMobile) {
                const handleOrientation = (event) => {
                    const { beta, gamma } = event;
                    if (beta === null || gamma === null) return;

                    const sensitivity = 3;
                    const offsetX = Math.max(-1, Math.min(1, gamma / 45)) * window.innerWidth / sensitivity;
                    const offsetY = Math.max(-1, Math.min(1, (beta - 45) / 45)) * window.innerHeight / sensitivity;
                    
                    setCenterPos({ 
                        x: window.innerWidth / 2 - offsetX, 
                        y: window.innerHeight / 2 - offsetY 
                    });
                };
                window.addEventListener('deviceorientation', handleOrientation);
                return () => window.removeEventListener('deviceorientation', handleOrientation);
            } else {
                const handleMouseMove = (event) => {
                    setCenterPos({ x: event.clientX, y: event.clientY });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }
        }, []);


        const memoizedDots = React.useMemo(() => {
            const dots = [];
            const gridSize = 50;
            const numCols = Math.ceil(window.innerWidth / gridSize);
            const numRows = Math.ceil(window.innerHeight / gridSize);

            for (let i = 0; i < numCols; i++) {
                for (let j = 0; j < numRows; j++) {
                    const x = i * gridSize;
                    const y = j * gridSize;
                    const dx = x - centerPos.x;
                    const dy = y - centerPos.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    const maxDist = 250;
                    const influence = Math.max(0, 1 - dist / maxDist);
                    
                    const displacement = influence * 15;
                    const finalX = x - (dx / dist) * displacement;
                    const finalY = y - (dy / dist) * displacement;
                    
                    const opacity = (theme === 'dark' ? 0.05 : 0.2) + influence * 0.4;

                    dots.push({
                        key: `${i}-${j}`,
                        cx: finalX,
                        cy: finalY,
                        r: 1,
                        opacity: opacity,
                    });
                }
            }
            return dots;
        }, [centerPos.x, centerPos.y, theme]);


        return (
            <svg className="fixed top-0 left-0 w-full h-full z-0 pointer-events-none">
                <g>
                    {memoizedDots.map(dot => (
                        <circle 
                            key={dot.key} 
                            cx={dot.cx} 
                            cy={dot.cy} 
                            r={dot.r} 
                            fill={dotColor} 
                            fillOpacity={dot.opacity}
                            style={{ transition: 'cx 0.1s ease-out, cy 0.1s ease-out, fill-opacity 0.1s ease-out' }}
                        />
                    ))}
                </g>
            </svg>
        );

                <div className="border-l-2 border-cyan-400 pl-6">
                  <p className="text-gray-400 leading-relaxed">{project.description}</p>
                </div>
              </div>

              <div>
                <h2 className="text-3xl font-bold uppercase tracking-wider mb-6 text-white">Galería de Carteles</h2>
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
                  {project.posterImages && project.posterImages.map((src, index) => (
                    <div key={index} className="group cursor-pointer" onClick={() => openModal(src)}>
                      <img 
                        src={src} 
                        alt={`Cartel ${index + 1}`} 
                        loading="lazy"
                        decoding="async"
                        className="w-full h-auto object-cover transition-transform duration-300 transform group-hover:scale-105 rounded-md shadow-lg"
                      />

              </div>
            </main>

            {modalImage && (
              <div 
                className="fixed inset-0 bg-black bg-opacity-90 z-50 flex items-center justify-center p-4 animate-fade-in"
                onClick={closeModal}
              >
                <img 
                  src={modalImage} 
                  alt="Vista ampliada del cartel" 
                  className="max-w-full max-h-full object-contain"
                  onClick={(e) => e.stopPropagation()}
                />
                 <button 
                    onClick={closeModal} 
                    className="absolute top-4 right-4 text-white text-4xl font-bold hover:text-gray-300"
                  >&times;</button>
              </div>
            )}
          </div>
        );
      };

      const AIStudioPage = () => {
        const LinkEntry = ({ href, children }) => (
          <a href={href} target="_blank" rel="noopener noreferrer" className="inline-flex items-center space-x-2 text-cyan-400 hover:text-white transition-colors duration-300">
            <span>{children}</span>
            <svg stroke="currentColor" fill="none" strokeWidth="0" viewBox="0 0 15 15" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path fillRule="evenodd" clipRule="evenodd" d="M3.64645 11.3536C3.45118 11.1583 3.45118 10.8417 3.64645 10.6465L10.2929 4L6 4C5.72386 4 5.5 3.77614 5.5 3.5C5.5 3.22386 5.72386 3 6 3L11.5 3C11.6326 3 11.7598 3.05268 11.8536 3.14645C11.9473 3.24022 12 3.36739 12 3.5L12 9.00001C12 9.27615 11.7761 9.50001 11.5 9.50001C11.2239 9.50001 11 9.27615 11 9.00001V4.70711L4.35355 11.3536C4.15829 11.5488 3.84171 11.5488 3.64645 11.3536Z" fill="currentColor"></path></svg>
          </a>
        );

        const Section = ({ title, children }) => (
          <div className="mb-12">
            <h2 className="text-3xl font-bold uppercase tracking-wider mb-6 text-white">{title}</h2>
            <div className="border-l-2 border-cyan-400 pl-6">{children}</div>
          </div>
        );
        
        const SubSection = ({ title, children }) => (
          <div className="mb-8">
            <h3 className="text-xl font-bold font-mono tracking-wider mb-4 text-cyan-400">{title}</h3>
            <div className="text-gray-400 space-y-4">{children}</div>
          </div>
        );
        
        return (
          <div className="w-full min-h-screen bg-black text-gray-300 animate-fade-in p-4 sm:p-8 md:p-12 relative overflow-auto">
            <InteractiveGridBackground />
            <main className="max-w-4xl mx-auto z-10 relative">
              <h1 className="text-4xl sm:text-6xl font-bold font-mono uppercase tracking-wider text-white mb-12 text-center">Generación de Imágenes</h1>
              
              <Section title="Modelos y APIs">
                  <div className="flex flex-col md:flex-row md:items-start space-y-8 md:space-y-0 md:space-x-8">
                      <div className="flex-1 space-y-6">
                          <SubSection title="STABLE DIFFUSION">
                              <ul className="list-none space-y-2">
                                  <li><LinkEntry href="https://github.com/AUTOMATIC1111/stable-diffusion-webui">AUTOMATIC1111 (Uso general)</LinkEntry></li>
                                  <li><LinkEntry href="https://colab.research.google.com/github/lllyasviel/Fooocus/blob/main/fooocus_colab.ipynb">Fooocus (Recomendado)</LinkEntry></li>
                              </ul>
                          </SubSection>
                          <SubSection title="Otros Modelos">
                               <ul className="list-none space-y-2">
                                  <li><LinkEntry href="https://blackforestlabs.ai/announcing-black-forest-labs/">FLUX</LinkEntry></li>
                                  <li><LinkEntry href="https://www.bing.com/chat?q=Bing+AI&showconv=1">BING CHAT (Dall-E 3)</LinkEntry></li>
                                  <li><LinkEntry href="https://huggingface.co/spaces">Hugging Face Spaces</LinkEntry></li>
                              </ul>
                          </SubSection>
                      </div>
                      <div className="flex-1 flex justify-center items-center">
                          <img src="imagenes/gif-animacion-ia.gif" alt="Esquema animado de IA" className="rounded-lg shadow-lg w-full max-w-sm"/>
                      </div>
                  </div>
              </Section>
              
              <Section title="Tutoriales">
                  <SubSection title="FOOOCUS (con Google Colab)">
                      <div className="space-y-12">
                          <div>
                              <h4 className="text-lg font-bold mb-3 text-gray-100">1. INICIAR FOOOCUS</h4>
                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                  <img src="imagenes/focus 1.png" alt="Focus - Paso 1" className="rounded-md w-full h-auto object-contain" />
                                  <img src="imagenes/focus 2.png" alt="Focus - Paso 2" className="rounded-md w-full h-auto object-contain" />
                              </div>
                          </div>
                          <div>
                              <h4 className="text-lg font-bold mb-3 text-gray-100">2. GENERAR IMÁGENES CON TEXTO</h4>
                              <img src="imagenes/focus 3.png" alt="Focus - Generar con texto" className="rounded-md w-full h-auto" />
                          </div>
                          <div>
                              <h4 className="text-lg font-bold mb-3 text-gray-100">3. GENERAR IMÁGENES CON IMÁGENES DE REFERENCIA</h4>
                              <p className="mb-2">3.1</p>
                              <img src="imagenes/focus 4.png" alt="Focus - Referencia paso 1" className="rounded-md mb-4 w-full h-auto" />
                              <p className="mb-2">3.2</p>
                              <img src="imagenes/focus 5.png" alt="Focus - Referencia paso 2" className="rounded-md w-full h-auto" />
                          </div>
                          <div>
                              <h4 className="text-lg font-bold mb-3 text-gray-100">4. MODIFICAR SOLO UNA PARTE DE LA IMAGEN (INPAINT)</h4>
                              <img src="imagenes/focus 6.png" alt="Focus - Inpaint" className="rounded-md w-full h-auto" />
                          </div>
                          <div>
                              <h4 className="text-lg font-bold mb-3 text-gray-100">5. MÁS AJUSTES</h4>
                              <img src="imagenes/focus 7.png" alt="Focus - Ajustes" className="rounded-md w-full h-auto" />
                          </div>
                      </div>
                  </SubSection>
              </Section>
              
            </main>
            <footer className="relative text-xs text-gray-500 z-10 text-center py-4 mt-8">© 2024 Benito G. Quiñones</footer>
          </div>
        );
      };


      const ProjectDetailPage = ({ project, allProjectsData, onProjectSelect }) => {
        if (!project) return null;

        const relatedProjects = allProjectsData.filter(p => p.category === project.category && !p.isPage);
        const currentIndex = relatedProjects.findIndex(p => p.id === project.id);
        const prevProject = currentIndex > 0 ? relatedProjects[currentIndex - 1] : null;
        const nextProject = currentIndex < relatedProjects.length - 1 ? relatedProjects[currentIndex + 1] : null;

        return (
          <div className="w-full min-h-screen bg-white text-black animate-fade-in overflow-y-auto relative">
            <InteractiveGridBackground theme="light" />

            <main className="max-w-4xl mx-auto z-10 relative pt-24 pb-12 px-4 sm:px-6 lg:px-8">
              <h1 className="text-4xl sm:text-6xl font-bold font-mono uppercase tracking-wider text-black mb-16 text-center">{project.title}</h1>
              
              <div className="mb-16">
                <h2 className="text-3xl font-bold uppercase tracking-wider mb-6 text-gray-800">Descripción</h2>
                <div className="border-l-2 border-gray-400 pl-6">
                  <div className="text-gray-700 space-y-4 leading-relaxed" dangerouslySetInnerHTML={{ __html: project.description.replace(/\n/g, '<br />') }} />
                </div>
              </div>
              
              {project.images && project.images.length > 0 && (
                <div>
                  <h2 className="text-3xl font-bold uppercase tracking-wider mb-6 text-gray-800">Galería</h2>
                  <div className="space-y-8">
                    {project.images.map((imgSrc, index) => (
                      <img 
                        key={index} 
                        src={imgSrc} 
                        alt={`${project.title} - Imagen ${index + 1}`} 
                        loading="lazy" 
                        decoding="async" 
                        className="w-full h-auto object-cover rounded-lg shadow-lg"
                      />
                    ))}
                  </div>
                </div>
              )}
            </main>

            { (prevProject || nextProject) &&
              <nav className="max-w-4xl mx-auto mt-16 pt-8 px-4 sm:px-6 lg:px-8 border-t border-gray-200 z-10 relative">
                <div className="flex justify-between items-start">
                    <div className="w-1/2 pr-4 text-left">
                        {prevProject && (
                            <button onClick={() => onProjectSelect(prevProject.id)} className="group w-full">
                                <span className="text-xs uppercase tracking-widest text-gray-500">&larr; Anterior</span>
                                <p className="text-lg font-bold group-hover:underline truncate text-gray-900">{prevProject.title}</p>
                            </button>
                        )}
                    </div>
                    <div className="w-1/2 pl-4 text-right">
                        {nextProject && (
                            <button onClick={() => onProjectSelect(nextProject.id)} className="group w-full">
                                <span className="text-xs uppercase tracking-widest text-gray-500">Siguiente &rarr;</span>
                                <p className="text-lg font-bold group-hover:underline truncate text-gray-900">{nextProject.title}</p>
                            </button>
                        )}
                    </div>
                </div>
              </nav>
            }

            <footer className="bg-gray-50 text-gray-600 text-center p-6 mt-12 z-10 relative">
              {project.pdf && (
                <div className="mb-4">
                    <a href={project.pdf} target="_blank" rel="noopener noreferrer" className="text-sm text-gray-500 hover:text-black underline transition-colors">
                        Descargar portfolio completo (PDF)
                    </a>
                </div>
              )}
              <p className="text-xs">
                © 2024 Benito G. Quiñones - Todos los derechos reservados - arquitecturabenito@gmail.com
              </p>
            </footer>
          </div>
        );
      };
      
      const FilterControls = ({ currentFilter, onFilterChange }) => {
        const filters = [
          { key: 'all', label: 'Todos' },
          { key: 'architecture', label: 'Arquitectura' },
          { key: 'design', label: 'Diseño' },
          { key: 'escenografias', label: 'Escenografías' },
        ];
        
        const contactFilter = { key: 'contact', label: 'Contacto' };
        
        return (
          <React.Fragment>
            {/* Desktop */}
            <div className="hidden md:flex fixed top-4 left-4 z-20 space-x-2 bg-black/30 backdrop-blur-sm p-1 rounded-full">
              {[...filters, contactFilter].map(filter => (
                <button
                  key={filter.key}
                  onClick={() => onFilterChange(filter.key)}
                  className={`px-3 py-1 text-xs sm:text-sm font-mono uppercase tracking-wider rounded-full transition-all duration-200 ${
                    currentFilter === filter.key
                      ? 'bg-cyan-400 text-black shadow-lg'
                      : 'text-white hover:bg-white/20'
                  }`}
                >
                  {filter.label}
                </button>
              ))}
            </div>
            {/* Mobile */}
            <div className="md:hidden fixed top-0 left-0 w-full z-20 flex justify-center space-x-2 bg-black/50 backdrop-blur-sm p-2">
               {filters.map(filter => (
                <button
                  key={filter.key}
                  onClick={() => onFilterChange(filter.key)}
                  className={`px-3 py-1 text-xs font-mono uppercase tracking-wider rounded-full transition-all duration-200 ${
                    currentFilter === filter.key
                      ? 'bg-cyan-400 text-black shadow-lg'
                      : 'text-white hover:bg-white/20'
                  }`}
                >
                  {filter.label}
                </button>
              ))}
            </div>
             <div className="md:hidden fixed bottom-0 left-0 w-full z-20 flex justify-center p-2">
               <button
                  key={contactFilter.key}
                  onClick={() => onFilterChange(contactFilter.key)}
                  className="px-4 py-2 text-sm font-mono uppercase tracking-wider rounded-full bg-black/50 backdrop-blur-sm text-white hover:bg-white/20"
                >
                  {contactFilter.label}
                </button>
            </div>
          </React.Fragment>
        );
      };

      // MAIN APP
      const App = () => {
        const [view, setView] = React.useState({ page: 'home', projectId: null });
        const [filter, setFilter] = React.useState('all');
        const [relativeMousePosition, setRelativeMousePosition] = React.useState({ x: 0, y: 0 });
        const [hoveredProjectImage, setHoveredProjectImage] = React.useState(null);
        const [bgImage, setBgImage] = React.useState(null);
        const [bgOpacity, setBgOpacity] = React.useState(0);


        React.useEffect(() => {
          // Preload ALL project images to make the hover effect instant
          const allImages = allProjectsData
            .filter(p => p.normalImage)
            .map(p => p.normalImage);
          
          allImages.forEach(src => {
            const img = new Image();
            img.src = src;
          });
        }, []); // Run only once on component mount

        React.useEffect(() => {
            const handleMouseMove = (event) => {
                // For the eye icon, relative to center
                if (['home', 'architecture', 'design', 'scenography'].includes(view.page)) {
                    setRelativeMousePosition({
                        x: event.clientX - window.innerWidth / 2,
                        y: event.clientY - window.innerHeight / 2
                    });
                }
            };
            
            window.addEventListener('mousemove', handleMouseMove);

            return () => {
                window.removeEventListener('mousemove', handleMouseMove);
            };
        }, [view.page]);
        
        React.useEffect(() => {
          if (hoveredProjectImage && ['architecture', 'design', 'scenography'].includes(view.page)) {
            setBgImage(hoveredProjectImage);
            setBgOpacity(1);
          } else {
            setBgOpacity(0);
          }
        }, [hoveredProjectImage, view.page]);

        React.useEffect(() => {
          const html = document.documentElement;
          const body = document.body;
          
          if (['home', 'architecture', 'design', 'scenography'].includes(view.page)) {
            html.style.overflow = 'hidden'; body.style.overflow = 'hidden';
          } else {
            html.style.overflow = 'auto'; body.style.overflow = 'auto';
          }
          
          window.scrollTo(0, 0);

          const isProjectDetail = view.page === 'project';
          html.style.backgroundColor = isProjectDetail ? '#fff' : '#000';
          body.style.backgroundColor = isProjectDetail ? '#fff' : '#000';

          return () => {
            html.style.overflow = 'auto'; body.style.overflow = 'auto';
          };
        }, [view.page, view.projectId]);
        
        const handleFilterChange = (newFilterKey) => {
            setHoveredProjectImage(null);
            setFilter(newFilterKey);
            const pageMap = {
                'architecture': 'architecture',
                'design': 'design',
                'escenografias': 'scenography',
                'contact': 'contact'
            };

            if (pageMap[newFilterKey]) {
                setView({ page: pageMap[newFilterKey], projectId: null });
            } else { // This handles 'all'
                setView({ page: 'home', projectId: null });
            }
        };

        const handleProjectSelect = React.useCallback((projectId, isPage = false) => {
          if (isPage) {
            setView({ page: 'generacion-ia', projectId: null });
            return;
          }
          const project = allProjectsData.find(p => p.id === projectId);
          if (project && project.id === 'carteleria') {
              setView({ page: 'carteleria', projectId });
          } else {
              setView({ page: 'project', projectId });
          }
        }, []);


        const handleNodeClick = React.useCallback((node) => {
          if (node.isProject && node.projectId) {
            const project = allProjectsData.find(p => p.id === node.projectId);
            if (project?.isPage) {
              handleProjectSelect(node.projectId, true);
            } else {
              handleProjectSelect(node.projectId, false);
            }
            return;
          }
          switch (node.id) {
            case 'ARQUITECTURA': setFilter('architecture'); setView({ page: 'architecture', projectId: null }); break;
            case 'DISEÑO': setFilter('design'); setView({ page: 'design', projectId: null }); break;
            case 'ESCENOGRAFÍAS': setFilter('escenografias'); setView({ page: 'scenography', projectId: null }); break;
            case 'CONTACTO': setFilter('contact'); setView({ page: 'contact', projectId: null }); break;
          }
        }, [handleProjectSelect]);
        
        const handleGoHome = () => {
          setHoveredProjectImage(null);
          setFilter('all');
          setView({ page: 'home', projectId: null });
        };

        const handleBack = () => {
            setHoveredProjectImage(null);
            if (view.page === 'project' || view.page === 'carteleria' || view.page === 'generacion-ia') {
                const project = allProjectsData.find(p => p.id === view.projectId);
                
                if (view.page === 'generacion-ia' || (project && project.category === 'design')) {
                    setFilter('design');
                    setView({ page: 'design', projectId: null });
                    return;
                }
                
                if (project && project.category === 'architecture') {
                    setFilter('architecture');
                    setView({ page: 'architecture', projectId: null });
                    return;
                }
                 
                if (project && project.category === 'escenografias') {
                    setFilter('escenografias');
                    setView({ page: 'scenography', projectId: null });
                    return;
                }

                handleGoHome();

            } else if (['architecture', 'design', 'scenography', 'contact'].includes(view.page)) {
                handleGoHome();
            }
        };
        
        const handleProjectHover = (project) => {
          setHoveredProjectImage(project ? project.normalImage : null);
        };

        const renderContent = () => {
          switch (view.page) {
            case 'home':
              return (
                <div className="w-full h-full flex items-center justify-center relative">
                  <div className="central-eye absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-0">
                    <EyeIcon mousePosition={relativeMousePosition} />
                  </div>
                  <div className="absolute top-0 left-0 w-full h-full z-10"><NetworkGraph onNodeClick={handleNodeClick} filter={filter} /></div>
                </div>
              );
            case 'architecture':
              return <OrbitalPage category="architecture" title="ARQUITECTURA" onProjectSelect={handleProjectSelect} onProjectHover={handleProjectHover} showEye={true} mousePosition={relativeMousePosition} />;
            case 'design':
              return <OrbitalPage category="design" title="DISEÑO" onProjectSelect={handleProjectSelect} onProjectHover={handleProjectHover} showEye={true} mousePosition={relativeMousePosition} />;
            case 'scenography':
              return <OrbitalPage category="escenografias" title="ESCENOGRAFÍAS" onProjectSelect={handleProjectSelect} onProjectHover={handleProjectHover} showEye={true} mousePosition={relativeMousePosition} />;
            case 'contact':
              return <ContactPage />;
            case 'carteleria': {
                const project = allProjectsData.find(p => p.id === view.projectId);
                return <CarteleriaPage project={project} />;
            }
            case 'generacion-ia': {
                return <AIStudioPage />;
            }
            case 'project':
              const project = allProjectsData.find(p => p.id === view.projectId);
              return <ProjectDetailPage project={project} allProjectsData={allProjectsData} onProjectSelect={handleProjectSelect} />;
            default:
              return null;
          }
        }

        return (
          <div className="w-full h-full relative">
            <div
                className="fixed inset-0 z-0 transition-opacity duration-700 ease-in-out pointer-events-none"
                style={{
                    backgroundImage: `url(${bgImage})`,
                    backgroundSize: 'cover',
                    backgroundPosition: 'center',
                    opacity: bgOpacity,
                    filter: 'blur(8px) brightness(0.5)',
                    maskImage: 'radial-gradient(circle at center, transparent 20%, black 35%)',
                    WebkitMaskImage: 'radial-gradient(circle at center, transparent 20%, black 35%)',
                }}
            />
            
            {['home', 'architecture', 'design', 'scenography', 'contact'].includes(view.page) && <FilterControls currentFilter={filter} onFilterChange={handleFilterChange} />}
            {view.page !== 'home' && <HomeButton onClick={handleGoHome} />}
            {['project', 'carteleria', 'generacion-ia'].includes(view.page) && <BackButton onClick={handleBack} theme={view.page === 'project' ? 'light' : 'dark'} />}
            {renderContent()}
          </div>
        );
      };

      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
      }

    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
