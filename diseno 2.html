<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benito G. Quiñones - Portafolio de Arquitecto</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        header {
        background-color: #343a40; /* Color de fondo más oscuro */
            padding: 20px;
            text-align: center;
         }
        nav {
            background-color: #343a40; /* Color de fondo más oscuro */
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff; /* Texto en color blanco */
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #fff;
            margin: 0 10px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        .title {
            font-size: 48px;
            color: #FFA500;
            text-align: center;
            margin-top: 20px;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .btn {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            margin: 0 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #555;
        }
        .container {
            position: relative;
            width: 100%;
            height: calc(100vh - 120px);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .project {
            position: absolute;
            width: 300px;
            padding: 20px;
            background-color: #222;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            overflow: hidden;
            transition: transform 5s ease-in-out;
        }
        .project img {
            width: 100%;
            border-radius: 10px;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .project:hover .overlay {
            opacity: 1;
        }
        .overlay img {
            width: 50px;
            margin-bottom: 10px;
        }
        .overlay p {
            margin: 0;
            color: #fff;
        }
        footer {
            background-color: #111;
            padding: 20px;
            text-align: center;
            position: absolute;
            width: 100%;
            bottom: 0;
            color: #fff;
        }
    </style>
</head>
<body>

<script>
    // Función para desplazarse a una sección específica de la página
    function scrollToSection(sectionId) {
        const section = document.getElementById(sectionId);
        section.scrollIntoView({ behavior: 'smooth' });
    }

    // Función para mover los proyectos a una posición final centrada en una galería de formato 3x2
    function moveProjects() {
        const projects = document.querySelectorAll('.project');
        const projectWidth = 300;
        const projectHeight = 300;
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        const horizontalSpacing = (screenWidth - (projectWidth * 3)) / 4;
        const verticalSpacing = (screenHeight - (projectHeight * 2)) / 3;

        projects.forEach((project, index) => {
            const row = Math.floor(index / 3);
            const col = index % 3;
            const horizontalPosition = (col + 1) * horizontalSpacing + col * projectWidth;
            const verticalPosition = (row + 1) * verticalSpacing + row * projectHeight;
            const initialHorizontalPosition = project.offsetLeft;
            const initialVerticalPosition = project.offsetTop;
            project.style.transition = "transform 5s ease-in-out";
            project.style.transform = `translate(${horizontalPosition - initialHorizontalPosition}px, ${verticalPosition - initialVerticalPosition}px)`;
        });
    }

    // Llama a la función para mover los proyectos al cargar la página
    window.onload = moveProjects;
</script>

</body>
